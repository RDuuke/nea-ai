run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - revive
    - gosec

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: nea-ai
  revive:
    rules:
      - name: var-naming
      - name: package-comments
        disabled: true
      - name: exported
        disabled: true
  gosec:
    excludes:
      - G104  # audited error returns are wrapped via fmt.Errorf

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
