# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: nea-ai

before:
  hooks:
    - go mod tidy

builds:
  - id: nea-ai
    main: ./cmd/nea-ai
    binary: nea-ai
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X nea-ai/internal/app.Version={{ .Version }}

archives:
  - id: nea-ai
    ids:
      - nea-ai
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - assets/brand/*.svg

nfpms:
  - id: nea-ai
    package_name: nea-ai
    ids:
      - nea-ai
    vendor: RDuuke
    homepage: https://github.com/RDuuke/nea-ai
    maintainer: juandg <juan.duque1008@gmail.com>
    description: |
      NEA AI control plane: installer + NeaBrain memory + Flow-NEA + OpenSpec + doctor.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: utils

brews:
  - name: nea-ai
    ids:
      - nea-ai
    repository:
      owner: RDuuke
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/RDuuke/nea-ai
    description: NEA AI local-first control plane for AI dev agents.
    license: MIT
    test: |
      system "#{bin}/nea-ai", "version"
    install: |
      bin.install "nea-ai"

scoops:
  - name: nea-ai
    ids:
      - nea-ai
    repository:
      owner: RDuuke
      name: scoop-bucket
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: bucket
    homepage: https://github.com/RDuuke/nea-ai
    description: NEA AI local-first control plane for AI dev agents.
    license: MIT

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+?\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+?\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
