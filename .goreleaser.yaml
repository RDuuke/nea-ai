version: 2

project_name: nea-ai

before:
  hooks:
    - go mod tidy

builds:
  - id: nea-ai
    main: ./cmd/nea-ai
    binary: nea-ai
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X nea-ai/internal/app.Version={{.Version}}

archives:
  - id: nea-ai
    builds:
      - nea-ai
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  name_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+?\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+?\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
