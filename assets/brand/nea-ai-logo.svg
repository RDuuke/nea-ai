<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">NEA AI logo</title>
  <desc id="desc">Horizontal NEA AI logo with a neon NEA control-plane mark and wordmark.</desc>
  <defs>
